services:
  app:
    build:
      context: .
      target: production
    expose:
      - "8888"
    environment:
      - NODE_ENV=production
      - PORT=8888
      - DATABASE_URL=mongodb://mongodb:27017/hotel-api
      - CORS_ORIGIN=*
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongodb_data:
